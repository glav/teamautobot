# =============================================================================
# TeamBot Stage Configuration
# =============================================================================
#
# This file defines the workflow stages for TeamBot orchestration.
# Each stage specifies which agents run, what artifacts are produced, and exit criteria.
#
# To customize the workflow, copy this file and point to it in teambot.json:
#   "stages_config": "path/to/custom-stages.yaml"
#
# =============================================================================
# SCHEMA REFERENCE
# =============================================================================
#
# Stage Fields:
#   name              - Display name for the stage (default: stage key)
#   description       - What this stage does (default: "")
#   work_agent        - Agent that executes work (see AGENT SEMANTICS below) (default: null)
#   review_agent      - Agent that performs review (review stages only) (default: null)
#   allowed_personas  - Personas allowed at this stage; enforced via is_persona_allowed()
#                       in state_machine.py (default: [])
#   artifacts             - Files produced by this stage (outputs, see ARTIFACT STORAGE) (default: [])
#   prerequisite_artifacts - Files required to exist before this stage runs (inputs) (default: [])
#   exit_criteria         - Completion conditions (informational) (default: [])
#   optional          - Whether stage can be skipped (default: false)
#   is_review_stage   - Triggers review iteration loop (default: false)
#   is_acceptance_test_stage - Triggers acceptance test handling (default: false)
#   requires_acceptance_tests_passed - Blocks if acceptance tests failed (default: false)
#   parallel_agents   - Agents that can run in parallel (default: null)
#   prompt_template   - Path to SDD prompt file (relative to repo root) (default: null)
#   include_objective - Include objective content in agent context (default: true)
#   output_schema     - JSON schema for structured stage output (default: null)
#                       When set, orchestrator validates that agent output conforms to the schema;
#                       raises a critical failure (OutputSchemaValidationError) if validation fails.
#   max_context_tokens - Soft limit on context tokens for this stage (default: null)
#                        When set, context is truncated (not summarized) from the end to fit
#                        within the token budget before being passed to the agent.
#
# Global Sections (at file level):
#   stages            - Map of stage definitions (required)
#   stage_order       - List defining sequential execution order (required)
#   parallel_groups   - Map of parallel stage groups (optional, see PARALLEL STAGE GROUPS)
#   work_to_review_mapping - Map of work stages to their review stages (required)
#
# =============================================================================
# AGENT FIELD SEMANTICS
# =============================================================================
#
# The meaning of work_agent and review_agent depends on stage type:
#
# WORK STAGES (is_review_stage: false):
#   work_agent   = Agent that executes the stage work
#   review_agent = Not used (should be null)
#
# REVIEW STAGES (is_review_stage: true):
#   work_agent   = Agent that addresses feedback and makes revisions
#   review_agent = Agent that reviews work and approves/rejects
#
# Review stages iterate up to 4 times:
#   1. work_agent executes or revises based on feedback
#   2. review_agent reviews and provides feedback
#   3. If not approved, work_agent addresses feedback
#   4. Repeat until approved or max iterations reached
#
# Example: In SPEC_REVIEW stage:
#   work_agent: ba        → Business Analyst revises the spec
#   review_agent: reviewer → Reviewer approves or requests changes
#
# =============================================================================
# ARTIFACT STORAGE
# =============================================================================
#
# Artifacts listed in the 'artifacts' field can be:
#
# 1. Simple filenames (no directory separators):
#    Stored at: {teambot_dir}/{feature_name}/artifacts/{artifact_filename}
#
#    Example:
#      Artifact: feature_spec.md
#      Full path: .teambot/add-user-login/artifacts/feature_spec.md
#
# 2. Directory-based paths (contains /):
#    Treated as repository-root-relative paths.
#    All SDD artifacts (specs, research, plans, test strategies) use this format.
#
#    Examples:
#      Artifact: .agent-tracking/specs/{name}.md
#      Full path: .agent-tracking/specs/{name}.md (relative to repo root)
#
#      Artifact: .agent-tracking/research/{date}-{name}-research.md
#      Full path: .agent-tracking/research/{date}-{name}-research.md (relative to repo root)
#
# Where:
#   teambot_dir  = .teambot (or custom path from teambot.json "teambot_dir")
#   feature_name = Derived from objective file (## Feature Name or filename)
#
# Note: The 'artifacts' field defines display paths shown to agents.
#       The ArtifactValidator handles finding files in multiple locations.
#
# Path Rendering: When displaying artifacts to agents, simple filenames are
#                 rendered relative to the project root. If relative path
#                 calculation fails, absolute paths are used as a fallback.
#
# =============================================================================
# REVIEW STAGE MAPPING
# =============================================================================
#
# Two related but distinct concepts control review behavior:
#
# 1. is_review_stage (per-stage field):
#    - Enables the review iteration loop for that stage
#    - When true, ReviewIterator handles the stage execution
#
# 2. work_to_review_mapping (global mapping at end of file):
#    - Defines which review stage follows each work stage
#    - Used for navigation and workflow sequencing
#
# These are NOT redundant - a stage can be in work_to_review_mapping
# without being a review stage itself (e.g., ACCEPTANCE_TEST → POST_REVIEW).
#
# =============================================================================
# PARALLEL STAGE GROUPS
# =============================================================================
#
# The parallel_groups section defines stages that can execute concurrently
# instead of sequentially. This enables workflow optimization by running
# independent stages in parallel.
#
# Each parallel group has the following fields:
#
#   after  - Trigger stage that must complete before parallel execution starts
#   stages - List of stage names to run concurrently
#   before - Gate stage that waits for all parallel stages to complete
#
# Example:
#   parallel_groups:
#     post_spec_review:
#       after: SPEC_REVIEW      # Parallel stages start after SPEC_REVIEW completes
#       stages:
#         - STAGE_A             # These two stages run concurrently
#         - STAGE_B
#       before: PLAN            # PLAN waits for both STAGE_A and STAGE_B
#
# Constraints:
#   - Parallel stages must be independent (no dependencies between them)
#   - All stages in a group must be defined in the 'stages' section
#   - The 'after' stage must precede all parallel stages in stage_order
#   - The 'before' stage must follow all parallel stages in stage_order
#   - Stages in a parallel group must use different work_agents. Using the
#     same agent in multiple parallel stages causes session conflicts and
#     will be rejected at startup with a validation error.
#
# =============================================================================
# VALIDATION RULES
# =============================================================================
#
# WORK STAGES (is_review_stage: false):
#   - Must have work_agent set (non-null)
#   - review_agent should be null
#   - allowed_personas must include work_agent's persona
#
# REVIEW STAGES (is_review_stage: true):
#   - Must have both work_agent and review_agent set
#   - work_agent handles revisions based on feedback
#   - review_agent performs approval/rejection
#   - allowed_personas must include review_agent's persona
#
# TERMINAL STAGE (COMPLETE):
#   - work_agent and review_agent should be null
#   - allowed_personas should be empty
#   - No artifacts produced
#
# =============================================================================

stages:
  SETUP:
    name: Setup
    description: Initialize project, configure agents, and establish working directory
    work_agent: pm
    review_agent: null
    allowed_personas:
      - project_manager
      - pm
    artifacts: []
    exit_criteria:
      - Environment ready
      - Configuration validated
    optional: false
    prompt_template: .agent/commands/sdd/sdd.0-initialize.prompt.md
    include_objective: false  # Generic initialization, no objective needed
    output_schema:
      type: object
      properties:
        stage: { type: string, const: "SETUP" }
        status: { type: string, enum: ["PASS", "FAIL"] }
        environment_ready: { type: boolean }
        blockers: { type: array, items: { type: string } }
      required: ["stage", "status", "environment_ready"]
    max_context_tokens: null  # Lightweight stage, no budget needed

  SPEC:
    name: Specification
    description: Create detailed feature specification
    work_agent: ba
    review_agent: reviewer
    allowed_personas:
      - business_analyst
      - ba
      - technical_writer
      - writer
    artifacts:
      # Note: Actual file created at .agent-tracking/specs/{name}.md
      # This is a pattern/description, not exact filename
      - .agent-tracking/specs/{name}.md
      - feature_spec.md  # Simplified reference for prerequisite_artifacts
    prerequisite_artifacts: []  # First content stage, no prereqs
    exit_criteria:
      - Complete specification with all required sections
    optional: false
    prompt_template: .agent/commands/sdd/sdd.1-create-feature-spec.prompt.md
    include_objective: true
    output_schema:
      type: object
      properties:
        stage: { type: string, const: "SPEC" }
        status: { type: string, enum: ["COMPLETE", "INCOMPLETE"] }
        artifacts_produced: { type: array, items: { type: string } }
        blockers: { type: array, items: { type: string } }
      required: ["stage", "status", "artifacts_produced"]
    max_context_tokens: null

  SPEC_REVIEW:
    name: Spec Review
    description: Review and approve the feature specification
    work_agent: ba
    review_agent: reviewer
    allowed_personas:
      - reviewer
      - project_manager
      - pm
    artifacts:
      - spec_review.md
    prerequisite_artifacts:
      - feature_spec.md
    exit_criteria:
      - Specification approved or revision feedback provided
    optional: false
    is_review_stage: true
    prompt_template: .agent/commands/sdd/sdd.2-review-spec.prompt.md
    include_objective: true
    output_schema:
      type: object
      properties:
        stage: { type: string, const: "SPEC_REVIEW" }
        decision: { type: string, enum: ["APPROVED", "NEEDS_REVISION", "BLOCKED"] }
        scores:
          type: object
          properties:
            completeness: { type: integer, minimum: 0, maximum: 10 }
            clarity: { type: integer, minimum: 0, maximum: 10 }
            testability: { type: integer, minimum: 0, maximum: 10 }
            technical_readiness: { type: integer, minimum: 0, maximum: 10 }
        blockers: { type: array, items: { type: string } }
        artifacts_produced: { type: array, items: { type: string } }
      required: ["stage", "decision", "scores"]
    max_context_tokens: null

  RESEARCH:
    name: Research
    description: Research technical approaches, analyze project structure, and identify dependencies
    work_agent: builder-1
    review_agent: null
    allowed_personas:
      - builder
      - developer
      - technical_writer
      - writer
    artifacts:
      # Note: Actual file created at .agent-tracking/research/YYYYMMDD-{name}-research.md
      # This is a pattern/description, not exact filename
      - .agent-tracking/research/{date}-{name}-research.md
      - research.md  # Simplified reference for prerequisite_artifacts
    prerequisite_artifacts:
      - feature_spec.md  # Will match *{feature_name}*.md in docs/feature-specs/ via feature-scoped glob
    exit_criteria:
      - Research document with implementation recommendations
    optional: false
    prompt_template: .agent/commands/sdd/sdd.3-research-feature.prompt.md
    include_objective: true
    output_schema:
      type: object
      properties:
        stage: { type: string, const: "RESEARCH" }
        status: { type: string, enum: ["COMPLETE", "INCOMPLETE"] }
        artifacts_produced: { type: array, items: { type: string } }
        key_findings: { type: array, items: { type: string } }
        blockers: { type: array, items: { type: string } }
      required: ["stage", "status", "artifacts_produced"]
    max_context_tokens: 32000  # Research can reference large codebases

  PLAN:
    name: Plan
    description: Create implementation plan with task breakdown and dependencies
    work_agent: pm
    review_agent: reviewer
    allowed_personas:
      - project_manager
      - pm
      - builder
      - developer
    artifacts:
      # Note: Actual files created at .agent-tracking/plans/YYYYMMDD-{name}-plan.instructions.md
      # and .agent-tracking/details/YYYYMMDD-{name}-details.md
      # These are patterns/descriptions, not exact filenames
      - .agent-tracking/plans/{date}-{name}-plan.instructions.md
      - .agent-tracking/details/{date}-{name}-details.md
      - implementation_plan.md  # Simplified reference for prerequisite_artifacts
    prerequisite_artifacts:
      - research.md  # Will match *{feature_name}*research*.md in .agent-tracking/research/ via feature-scoped glob
    exit_criteria:
      - Actionable plan with atomic tasks and clear dependencies
    optional: false
    prompt_template: .agent/commands/sdd/sdd.4-task-planner-for-feature.prompt.md
    include_objective: true
    output_schema:
      type: object
      properties:
        stage: { type: string, const: "PLAN" }
        status: { type: string, enum: ["COMPLETE", "INCOMPLETE"] }
        total_phases: { type: integer }
        total_tasks: { type: integer }
        artifacts_produced: { type: array, items: { type: string } }
        blockers: { type: array, items: { type: string } }
      required: ["stage", "status", "total_phases", "total_tasks", "artifacts_produced"]
    max_context_tokens: 32000  # Needs research + spec + planning context

  PLAN_REVIEW:
    name: Plan Review
    description: Review and approve the implementation plan
    work_agent: pm
    review_agent: reviewer
    allowed_personas:
      - reviewer
      - project_manager
      - pm
    artifacts:
      - plan_review.md
    prerequisite_artifacts:
      - implementation_plan.md
    exit_criteria:
      - Plan approved or revision feedback provided
    optional: false
    is_review_stage: true
    prompt_template: .agent/commands/sdd/sdd.5-review-plan.prompt.md
    include_objective: true
    output_schema:
      type: object
      properties:
        stage: { type: string, const: "PLAN_REVIEW" }
        decision: { type: string, enum: ["APPROVED", "NEEDS_REVISION", "BLOCKED"] }
        scores:
          type: object
          properties:
            completeness: { type: integer, minimum: 0, maximum: 10 }
            actionability: { type: integer, minimum: 0, maximum: 10 }
            test_integration: { type: integer, minimum: 0, maximum: 10 }
            implementation_readiness: { type: integer, minimum: 0, maximum: 10 }
        blockers: { type: array, items: { type: string } }
        artifacts_produced: { type: array, items: { type: string } }
      required: ["stage", "decision", "scores"]
    max_context_tokens: 32000

  IMPLEMENTATION:
    name: Implementation
    description: Execute the implementation plan, write code, and implement tests
    work_agent: builder-1
    review_agent: reviewer
    allowed_personas:
      - builder
      - developer
    artifacts: []  # Dynamic based on plan
    prerequisite_artifacts:
      - implementation_plan.md
    exit_criteria:
      - All tasks complete
      - Code implemented per plan
    optional: false
    parallel_agents:
      - builder-1
      - builder-2
    prompt_template: .agent/commands/sdd/sdd.6-task-implementer-for-feature.prompt.md
    include_objective: true
    output_schema:
      type: object
      properties:
        stage: { type: string, const: "IMPLEMENTATION" }
        status: { type: string, enum: ["COMPLETE", "INCOMPLETE"] }
        tasks_completed: { type: integer }
        tasks_total: { type: integer }
        files_created: { type: integer }
        files_modified: { type: integer }
        tests_written: { type: integer }
        tests_passing: { type: boolean }
        blockers: { type: array, items: { type: string } }
      required: ["stage", "status", "tasks_completed", "tasks_total"]
    max_context_tokens: 48000  # Largest context — needs plan, details, and research context

  IMPLEMENTATION_REVIEW:
    name: Implementation Review
    description: >
      Review implemented changes for quality, correctness, and adherence to spec.
      Also verifies that test execution and coverage meet the defined test strategy requirements.
    work_agent: builder-1
    review_agent: reviewer
    allowed_personas:
      - reviewer
    artifacts:
      - impl_review.md
      - test_results.md
    prerequisite_artifacts:
      - implementation_plan.md
    exit_criteria:
      - Implementation approved or revision feedback provided
      - All tests passing
      - Coverage targets met
    optional: false
    is_review_stage: true
    prompt_template: .agent/commands/sdd/sdd.6b-implementation-review.prompt.md
    include_objective: true
    output_schema:
      type: object
      properties:
        stage: { type: string, const: "IMPLEMENTATION_REVIEW" }
        decision: { type: string, enum: ["APPROVED", "NEEDS_REVISION", "BLOCKED"] }
        tasks_complete: { type: boolean }
        tests_passing: { type: boolean }
        coverage_met: { type: boolean }
        linting_passed: { type: boolean }
        blockers: { type: array, items: { type: string } }
        artifacts_produced: { type: array, items: { type: string } }
      required: ["stage", "decision", "tasks_complete", "tests_passing"]
    max_context_tokens: 48000  # Needs to review all implementation artifacts

  ACCEPTANCE_TEST:
    name: Acceptance Test
    description: >
      Execute acceptance test scenarios from the feature specification.
      These tests validate the implementation works end-to-end from a user's perspective.
      Unlike unit tests, acceptance tests exercise the complete user flow.
      The orchestration will NOT proceed to completion if any acceptance tests fail.
    work_agent: builder-1
    review_agent: null
    allowed_personas:
      - builder
      - developer
    artifacts:
      - acceptance_test_results.md
    prerequisite_artifacts:
      - impl_review.md
      - feature_spec.md
    exit_criteria:
      - All acceptance test scenarios executed
      - All acceptance tests passing
      - No failures blocking completion
    optional: false
    is_acceptance_test_stage: true  # Special flag for acceptance test handling
    # No prompt_template: acceptance testing is code-driven via AcceptanceTestExecutor,
    # which builds its own validation prompt from parsed feature spec scenarios.
    include_objective: true
    output_schema:
      type: object
      properties:
        stage: { type: string, const: "ACCEPTANCE_TEST" }
        total_scenarios: { type: integer }
        passed: { type: integer }
        failed: { type: integer }
        skipped: { type: integer }
        status: { type: string, enum: ["ALL_PASS", "FAILURES_PRESENT", "BLOCKED"] }
        blockers: { type: array, items: { type: string } }
      required: ["stage", "total_scenarios", "passed", "failed", "status"]
    max_context_tokens: 32000

  POST_REVIEW:
    name: Post Implementation Review
    description: >
      Final review, retrospective, and validation of all success criteria.
      MUST verify that acceptance tests have passed before approving.
      Cannot mark workflow as complete if acceptance tests failed.
    work_agent: pm
    review_agent: reviewer
    allowed_personas:
      - project_manager
      - pm
      - reviewer
    artifacts:
      - post_review.md
    prerequisite_artifacts:
      - acceptance_test_results.md
    exit_criteria:
      - All success criteria validated
      - Acceptance tests verified as passing
      - Final approval granted
    optional: false
    is_review_stage: true
    requires_acceptance_tests_passed: true  # Blocks completion if acceptance tests failed
    prompt_template: .agent/commands/sdd/sdd.7-post-implementation-review.prompt.md
    include_objective: true
    output_schema:
      type: object
      properties:
        stage: { type: string, const: "POST_REVIEW" }
        decision: { type: string, enum: ["APPROVED", "NEEDS_WORK", "BLOCKED"] }
        all_tests_passing: { type: boolean }
        acceptance_tests_passing: { type: boolean }
        coverage_targets_met: { type: boolean }
        ready_for_merge: { type: boolean }
        blockers: { type: array, items: { type: string } }
        artifacts_produced: { type: array, items: { type: string } }
      required: ["stage", "decision", "all_tests_passing", "acceptance_tests_passing"]
    max_context_tokens: 24000

  COMPLETE:
    name: Complete
    description: Workflow complete, all artifacts finalized
    work_agent: null
    review_agent: null
    allowed_personas: []
    artifacts: []
    exit_criteria:
      - All success criteria met
      - Documentation complete
    optional: false
    prompt_template: null
    include_objective: false

# Stage execution order
stage_order:
  - SETUP
  - SPEC
  - SPEC_REVIEW
  - RESEARCH
  - PLAN
  - PLAN_REVIEW
  - IMPLEMENTATION
  - IMPLEMENTATION_REVIEW
  - ACCEPTANCE_TEST
  - POST_REVIEW
  - COMPLETE

# Parallel stage groups - stages that execute concurrently
# after: trigger stage that must complete first
# stages: list of stages to run in parallel
# before: gate stage - all parallel stages must complete before this
# (No parallel groups configured by default)

# Mapping of work stages to their review stages
# Note: This defines NAVIGATION (which review follows which work stage).
# The is_review_stage flag on each stage controls EXECUTION BEHAVIOR.
# See header documentation for full explanation of the distinction.
work_to_review_mapping:
  SPEC: SPEC_REVIEW
  PLAN: PLAN_REVIEW
  IMPLEMENTATION: IMPLEMENTATION_REVIEW
  ACCEPTANCE_TEST: POST_REVIEW
